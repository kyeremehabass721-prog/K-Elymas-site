<!DOCTYPE html>
<html>
<head>

<title>My Books</title>
<style>
body{
    font-family: Arial, sans-serif;

h1{

    text-align:center;
    margin-bottom:30px;
}
.book{
    background:#111;
    border-radius:10px;
    padding:15px;
    margin-bottom:20px;
    max-width:400px;
}
.book img{
    width:100%;

}
.book h2{
    margin:10px 0 5px 0;
    font-size:20px;
    color:#ff6bb5;
}
.book p{
    font-size:14px;
    color:#ccc;
}
a.button{
    display:inline-block;
    margin-top:10px;
    padding:10px 20px;
    border-radius:8px;
    text-decoration:none;
    color:white;
    background:#2f5cff;
    font-weight:bold;
}
a.back{
    display:block;
    margin-top:30px;
    text-decoration:none;
    color:#7c7cff;
}
.container{
    display:flex;
    flex-direction:column;
    align-items:center;
}
